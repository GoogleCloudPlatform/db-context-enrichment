on:
  release:
    types: [created]
  workflow_dispatch:

permissions:
  contents: read

name: Release

jobs:
  # This job builds the self-contained executable for each supported platform
  build-artifacts:
    name: Build Binary
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          # Linux: Gemini CLI (NodeJS) uses "x64", but Toolbox (Go) uses "amd64".
          - os: ubuntu-latest
            platform_name: linux
            arch_name: x64
            toolbox_os: linux
            toolbox_arch: amd64
            toolbox_ext: ""
          # macOS: Gemini CLI (NodeJS) and Toolbox (Go) both use "arm64" for Apple Silicon.
          - os: macos-latest
            platform_name: darwin
            arch_name: arm64
            toolbox_os: darwin
            toolbox_arch: arm64
            toolbox_ext: ""
          # Windows: Gemini CLI (NodeJS) uses "x64", but Toolbox (Go) uses "amd64" with ".exe".
          - os: windows-latest
            platform_name: win32
            arch_name: x64
            toolbox_os: windows
            toolbox_arch: amd64
            toolbox_ext: ".exe"

    steps:
      # Checkout the repository code
      - uses: actions/checkout@v4

      # Install the `uv` Python package manager which handles fast installations
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      # Setup the correct Python version defined by uv
      - name: Set up Python
        run: uv python install

      # Install all project dependencies defined in pyproject.toml / uv.lock
      - name: Install dependencies
        run: uv sync --frozen

      # Extract the targeted genai-toolbox version from pyproject.toml
      - name: Get Toolbox Version
        shell: bash
        run: |
          TOOLBOX_VERSION=$(grep -o '^toolbox_version = "[^"]*"' pyproject.toml | cut -d '"' -f 2)
          echo "Found toolbox version: ${TOOLBOX_VERSION}"
          echo "TOOLBOX_VERSION=${TOOLBOX_VERSION}" >> $GITHUB_ENV

      # Extract evalbench version from pyproject.toml
      - name: Get Evalbench Version
        shell: bash
        run: |
          EVALBENCH_VERSION=$(grep -o '^evalbench_version = "[^"]*"' pyproject.toml | cut -d '"' -f 2)
          echo "Found evalbench version: ${EVALBENCH_VERSION}"
          echo "EVALBENCH_VERSION=${EVALBENCH_VERSION}" >> $GITHUB_ENV

      # Download the pre-compiled genai-toolbox binary for the target platform
      - name: Download genai-toolbox binary
        shell: bash
        run: |
          DOWNLOAD_URL="https://storage.googleapis.com/genai-toolbox/v${{ env.TOOLBOX_VERSION }}/${{ matrix.toolbox_os }}/${{ matrix.toolbox_arch }}/toolbox${{ matrix.toolbox_ext }}"
          echo "Downloading toolbox from: ${DOWNLOAD_URL}"
          curl -L --fail -o "toolbox${{ matrix.toolbox_ext }}" "${DOWNLOAD_URL}"
          chmod +x "toolbox${{ matrix.toolbox_ext }}"

      # Download the evalbench binary for the target platform
      - name: Download evalbench binary
        shell: bash
        run: |
          if [ "${{ runner.os }}" == "Windows" ]; then
            ARCHIVE="${{ matrix.platform_name }}.${{ matrix.arch_name }}.evalbench.zip"
          else
            ARCHIVE="${{ matrix.platform_name }}.${{ matrix.arch_name }}.evalbench.tar.gz"
          fi
          DOWNLOAD_URL="https://github.com/GoogleCloudPlatform/evalbench/releases/download/v${{ env.EVALBENCH_VERSION }}/${ARCHIVE}"
          echo "Downloading evalbench from: ${DOWNLOAD_URL}"
          curl -L --fail -o "${ARCHIVE}" "${DOWNLOAD_URL}"

          if [ "${{ runner.os }}" == "Windows" ]; then
            unzip -o "${ARCHIVE}"
          else
            tar -xzf "${ARCHIVE}"
          fi

          chmod +x "evalbench${{ matrix.toolbox_ext }}"
          rm "${ARCHIVE}"

      # Package the Python application into a standalone executable using PyInstaller
      - name: Build binary with PyInstaller
        run: uv run pyinstaller pyinstaller.spec

      # Validate the built binary starts successfully before packaging
      - name: Validate binary
        shell: bash
        run: |
          if [ "${{ runner.os }}" == "Windows" ]; then
            ./dist/google-cloud-db-context-engineering.exe --help
          else
            ./dist/google-cloud-db-context-engineering --help
          fi

      # Prepare the final distribution folder containing the binary, config, and docs
      - name: Prepare distribution
        shell: bash
        run: |
          mkdir -p staging

          cp -r plugin/skills/ staging/skills/
          cp -r plugin/commands/ staging/commands/
          mkdir -p staging/skills/autoctx-init/scripts/
          mkdir -p staging/skills/autoctx-evaluate/scripts/

          if [ "${{ runner.os }}" == "Windows" ]; then
            mv dist/google-cloud-db-context-engineering.exe staging/
            mv toolbox.exe staging/skills/autoctx-init/scripts/
            mv evalbench.exe staging/skills/autoctx-evaluate/scripts/
            BINARY_NAME="\${extensionPath}/google-cloud-db-context-engineering.exe"
            TOOLBOX_NAME="\${extensionPath}/skills/autoctx-init/scripts/toolbox.exe"
          else
            mv dist/google-cloud-db-context-engineering staging/
            mv toolbox staging/skills/autoctx-init/scripts/
            mv evalbench staging/skills/autoctx-evaluate/scripts/
            BINARY_NAME="\${extensionPath}/google-cloud-db-context-engineering"
            TOOLBOX_NAME="\${extensionPath}/skills/autoctx-init/scripts/toolbox"
          fi

          jq ".contextFileName = \"GEMINI.md\" | .mcpServers.mcp_db_context_engineering.command = \"$BINARY_NAME\" | .mcpServers.mcp_db_context_engineering.args = [] | .mcpServers.mcp_toolbox = {\"command\": \"$TOOLBOX_NAME\", \"args\": [\"--stdio\", \"--config\", \"autoctx/tools.yaml\"]}" plugin/gemini-extension.json > staging/gemini-extension.json
          cp plugin/GEMINI.md staging/
          cp LICENSE staging/

      # Create a compressed tarball archive for Linux and macOS distributions
      - name: Archive artifacts (Unix)
        if: runner.os != 'Windows'
        working-directory: staging
        run: |
          tar -czf ../${{ matrix.platform_name }}.${{ matrix.arch_name }}.google-cloud-db-context-engineering.tar.gz *

      # Create a zip archive for Windows distributions
      - name: Archive artifacts (Windows)
        if: runner.os == 'Windows'
        working-directory: staging
        run: |
          Compress-Archive -Path * -DestinationPath ../${{ matrix.platform_name }}.${{ matrix.arch_name }}.google-cloud-db-context-engineering.zip

      # Upload the archives to GitHub Actions artifacts so the publish job can access them
      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.platform_name }}-${{ matrix.arch_name }}
          path: |
            ${{ matrix.platform_name }}.${{ matrix.arch_name }}.google-cloud-db-context-engineering.tar.gz
            ${{ matrix.platform_name }}.${{ matrix.arch_name }}.google-cloud-db-context-engineering.zip
          if-no-files-found: error
          retention-days: 1

  # This job gathers the built executables and attaches them as release assets
  publish-release:
    needs: build-artifacts
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      # Download all platform archives generated by the build-artifacts job
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          pattern: binary-*
          merge-multiple: true

      # Attach the downloaded archives as assets to the created GitHub Release
      - name: Upload Release Assets
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.release.tag_name }}
          files: release-assets/*

  # After PyPI publishes the new wheel, open a PR to pin the Claude Code
  # plugin marketplace ref to this release tag. The PR gate ensures users
  # never install a marketplace version pointing at a missing PyPI wheel.
  pin-marketplace-ref:
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - name: Wait for PyPI release
        run: |
          TAG="${{ github.event.release.tag_name }}"
          VERSION="${TAG#v}"
          PKG="google-cloud-db-context-engineering"
          for i in {1..72}; do
            if curl -sf "https://pypi.org/pypi/${PKG}/${VERSION}/json" > /dev/null; then
              echo "PyPI ${PKG}==${VERSION} is live"
              exit 0
            fi
            echo "Waiting for PyPI ${PKG}==${VERSION} (attempt $i/72)..."
            sleep 300
          done
          echo "::error::Timed out waiting for PyPI ${PKG}==${VERSION}"
          exit 1

      - name: Open PR to pin marketplace ref
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.event.release.tag_name }}"
          BRANCH="chore/pin-marketplace-${TAG}"
          jq --arg ref "$TAG" '.plugins[0].source.ref = $ref' \
            .claude-plugin/marketplace.json > tmp && mv tmp .claude-plugin/marketplace.json
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add .claude-plugin/marketplace.json
          git commit -m "chore: pin marketplace ref to $TAG"
          git push -u origin "$BRANCH"
          gh pr create \
            --title "chore: pin marketplace ref to $TAG" \
            --body "Auto-generated after PyPI wheel for \`$TAG\` is live. Merging this updates the Claude Code plugin marketplace to install \`$TAG\`." \
            --base main --head "$BRANCH"
