name: Presubmit

on:
  pull_request:

jobs:
  validate-mcp-version-pin:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check plugin.json version matches uvx args pin
        run: |
          set -euo pipefail
          FILE=plugin/.claude-plugin/plugin.json
          VERSION=$(jq -r '.version' "$FILE")
          ARG=$(jq -r '.mcpServers["db-context-engineering"].args[0]' "$FILE")
          EXPECTED="google-cloud-db-context-engineering@${VERSION}"
          if [ "$ARG" != "$EXPECTED" ]; then
            echo "::error file=$FILE::version pin mismatch: \$.version=$VERSION but args[0]=$ARG (expected $EXPECTED)"
            exit 1
          fi
      - name: Check gemini-extension.json version matches uvx args pin
        run: |
          set -euo pipefail
          FILE=gemini-extension.json
          VERSION=$(jq -r '.version' "$FILE")
          ARG=$(jq -r '.mcpServers["db-context-engineering"].args[0]' "$FILE")
          EXPECTED="google-cloud-db-context-engineering@${VERSION}"
          if [ "$ARG" != "$EXPECTED" ]; then
            echo "::error file=$FILE::version pin mismatch: \$.version=$VERSION but args[0]=$ARG (expected $EXPECTED)"
            exit 1
          fi

  lint-and-format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Ruff
        run: pipx install ruff
      - name: Lint with Ruff
        run: ruff check .
      - name: Check formatting with Ruff
        run: ruff format --check .

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        run: pipx install uv

      - name: Cache uv dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: ${{ runner.os }}-uv-${{ hashFiles('uv.lock') }}
          restore-keys: |
            ${{ runner.os }}-uv-

      - name: Create uv virtual environment
        run: uv venv

      - name: Install dependencies
        run: uv pip install ".[test]"
      - name: Run tests
        run: uv run pytest

      - name: Install PyInstaller
        run: uv pip install pyinstaller

      - name: Build binary
        run: uv run pyinstaller pyinstaller.spec

      - name: Validate binary
        run: ./dist/google-cloud-db-context-engineering --help
